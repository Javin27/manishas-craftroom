  <script>
    const gradients = [
      "linear-gradient(135deg, #fff1f5, #e8fff3)",
      "linear-gradient(135deg, #fff1f5, #ffe8ec)",
      "linear-gradient(135deg, #f3fff8, #e8fff3)",
      "linear-gradient(135deg, #fff7e6, #fff1cc)"
    ];

    let index = 0;
    setInterval(() => {
      document.body.style.background = gradients[index];
      index = (index + 1) % gradients.length;
    }, 1000);
  </script>
